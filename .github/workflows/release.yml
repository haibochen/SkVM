name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # create GH Release + upload assets
  id-token: write    # npm provenance

jobs:
  build:
    # macOS runner: bun cross-compiles all four targets from darwin-arm64,
    # and darwin outputs get ad-hoc linker-signed so macOS will actually exec
    # them. Cross-compiling darwin targets from linux produces unsigned
    # Mach-O binaries that macOS SIGKILLs on first run.
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout (no submodules — skvm-data not needed for build)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned: bun 1.3.12 on macos-arm64 stopped ad-hoc linker-signing
          # `--compile --target=bun-darwin-*` outputs, producing binaries that
          # macOS SIGKILLs. 1.3.11 still signs them correctly. Revisit when
          # upstream bun ships a fix.
          bun-version: "1.3.11"

      - name: Install deps (skip postinstall — dev repo guard already handles it, but be explicit)
        run: SKVM_SKIP_POSTINSTALL=1 bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version to tag
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Build all targets (bun cross-compilation)
        run: bun run build:all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-tarballs
          path: |
            dist/skvm-*.tar.gz
            dist/skvm-*.tar.gz.sha256
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-tarballs
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/skvm-*.tar.gz
            dist/skvm-*.tar.gz.sha256

  npm-publish:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # Kill switch: publishing is enabled by default; set the
    # ENABLE_NPM_PUBLISH repo variable to "false" to skip this job
    # (e.g. during staged rollouts or if npm is broken).
    if: ${{ vars.ENABLE_NPM_PUBLISH != 'false' }}
    # Trusted Publishing: auth is via GitHub Actions OIDC JWT, not NPM_TOKEN.
    # The `id-token: write` permission at the top of this workflow issues the
    # JWT; the npm side must have this workflow configured as a Trusted
    # Publisher under @ipads-skvm/skvm's package settings. No secrets here.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm Trusted Publishing currently requires npm >= 11.5.1
          # and Node >= 22.14.0; use a current LTS/runtime here.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync package.json version to tag
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = '${version}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish --access public
